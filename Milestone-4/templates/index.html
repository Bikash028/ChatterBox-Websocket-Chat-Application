<!DOCTYPE html>
<html>
<head>
<title>Chatterbox Final</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

.container {
    width:420px;
    margin:40px auto;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
}

#chat {
    height:320px;
    overflow-y:auto;
    padding:10px;
    background:rgba(0,0,0,0.3);
    border-radius:10px;
}

.msg { padding:8px; margin:5px; border-radius:10px; }
.me { background:#00c6ff; color:black; margin-left:auto; text-align:right; }
.other { background:#fff; color:black; }

.system { text-align:center; color:#ccc; }

</style>

</head>

<body>

<div class="container">

<h2>💬 Chatterbox</h2>

<select id="room">
<option value="general">General</option>
<option value="tech">Tech</option>
<option value="fun">Fun</option>
</select>

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

</div>

<script>

const chat = document.getElementById("chat");
const roomSelect = document.getElementById("room");

let username = prompt("Enter your name:");
let currentRoom = roomSelect.value;

const ws = new WebSocket("ws://localhost:8000/ws");

function joinRoom(room){
    ws.send(JSON.stringify({
        type:"join",
        username:username,
        room:room
    }));
}

ws.onopen = () => {
    joinRoom(currentRoom);
};

roomSelect.addEventListener("change", ()=>{
    currentRoom = roomSelect.value;
    chat.innerHTML = "";
    joinRoom(currentRoom);
});

ws.onmessage = (e)=>{
    const data = JSON.parse(e.data);
    const div = document.createElement("div");

    if(data.type==="chat"){
        div.classList.add("msg");
        div.classList.add(data.username===username?"me":"other");

        div.innerHTML = "<b>"+data.username+"</b>: "+data.message+" <br>"+data.time;
    }

    if(data.type==="system"){
        div.classList.add("system");
        div.innerText = data.message;
    }

    chat.appendChild(div);
};

function sendMsg(){
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    ws.send(JSON.stringify({type:"chat", message:msg}));
    document.getElementById("msg").value="";
}

</script>

</body>
</html>
